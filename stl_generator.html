<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旋转体STL模型生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .help-text {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        
        .help-text code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-info {
            margin-bottom: 15px;
            color: #333;
        }
        
        .result-info strong {
            color: #667eea;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 旋转体STL模型生成器</h1>
        <p class="subtitle">输入轮廓点坐标，自动生成360度旋转体STL文件</p>
        
        <div class="input-section">
            <div class="input-group">
                <label for="points">轮廓点坐标（每行一个点，格式：x, y 或 x y）</label>
                <textarea id="points">0, 0
-35, 0
-35, 5
-25, 5
-25, 20
-20, 20
-20, 10
0, 10</textarea>
                <div class="help-text">
                    <strong>使用说明：</strong><br>
                    • 每行输入一个点的坐标，格式为 <code>x, y</code> 或 <code>x y</code><br>
                    • x坐标：水平方向（旋转轴为y轴）<br>
                    • y坐标：垂直方向（旋转体的高度）<br>
                    • 点按顺序连接形成轮廓，最后一个点会自动连接到第一个点<br>
                    • 建议从旋转轴（x=0）开始，形成闭合轮廓
                </div>
            </div>
            
            <div class="input-group">
                <label for="segments">旋转分段数（精度，越大越平滑）：</label>
                <input type="number" id="segments" value="128" min="32" max="512" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px;">
                <div class="help-text">
                    推荐值：64-256。数值越大，模型越平滑，但文件也越大。
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="generateSTL()">生成STL文件</button>
                <button class="btn-secondary" onclick="loadExample()">加载示例</button>
                <button class="btn-success" onclick="clearAll()">清空</button>
            </div>
        </div>
        
        <div id="result" class="result-section">
            <div id="resultInfo" class="result-info"></div>
            <div id="errorMsg" class="error" style="display: none;"></div>
            <div id="successMsg" class="success" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 解析输入的点坐标
        function parsePoints(text) {
            const lines = text.trim().split('\n');
            const points = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // 支持两种格式：x, y 或 x y
                const match = line.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
                if (match) {
                    const x = parseFloat(match[1]);
                    const y = parseFloat(match[2]);
                    points.push([x, y]);
                }
            }
            
            return points;
        }
        
        // 向量叉积
        function crossProduct(v1, v2) {
            return [
                v1[1] * v2[2] - v1[2] * v2[1],
                v1[2] * v2[0] - v1[0] * v2[2],
                v1[0] * v2[1] - v1[1] * v2[0]
            ];
        }
        
        // 向量减法
        function subtract(v1, v2) {
            return [v1[0] - v2[0], v1[1] - v2[1], v1[2] - v2[2]];
        }
        
        // 向量归一化
        function normalize(v) {
            const norm = Math.sqrt(v[0]**2 + v[1]**2 + v[2]**2);
            if (norm > 0) {
                return [v[0]/norm, v[1]/norm, v[2]/norm];
            }
            return [0, 0, 0];
        }
        
        // 生成STL文件
        function generateSTL() {
            const pointsText = document.getElementById('points').value;
            const segments = parseInt(document.getElementById('segments').value) || 128;
            const resultDiv = document.getElementById('result');
            const resultInfo = document.getElementById('resultInfo');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            // 隐藏消息
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            resultDiv.classList.add('show');
            
            try {
                // 解析点
                const profilePoints = parsePoints(pointsText);
                
                if (profilePoints.length < 3) {
                    throw new Error('至少需要3个点才能形成轮廓！');
                }
                
                const numProfilePoints = profilePoints.length;
                const numRotationSegments = segments;
                const vertices = [];
                const faces = [];
                
                // 生成所有顶点
                for (let i = 0; i <= numRotationSegments; i++) {
                    const angle = 2 * Math.PI * i / numRotationSegments;
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    
                    for (let j = 0; j < numProfilePoints; j++) {
                        const [x, z] = profilePoints[j];
                        const xRotated = x * cosA;
                        const zRotated = x * sinA;
                        const yCoord = z;
                        
                        vertices.push([xRotated, yCoord, zRotated]);
                    }
                }
                
                // 生成面
                for (let i = 0; i < numRotationSegments; i++) {
                    for (let j = 0; j < numProfilePoints - 1; j++) {
                        // 检查是否在旋转轴上
                        const x1 = profilePoints[j][0];
                        const x2 = profilePoints[j + 1][0];
                        
                        if (Math.abs(x1) < 0.001 && Math.abs(x2) < 0.001) {
                            continue; // 跳过旋转轴上的点
                        }
                        
                        const currRingStart = i * numProfilePoints;
                        const nextRingStart = (i === numRotationSegments - 1) ? 0 : (i + 1) * numProfilePoints;
                        
                        const v1Idx = currRingStart + j;
                        const v2Idx = currRingStart + j + 1;
                        const v3Idx = nextRingStart + j;
                        const v4Idx = nextRingStart + j + 1;
                        
                        faces.push([v1Idx, v2Idx, v3Idx]);
                        faces.push([v2Idx, v4Idx, v3Idx]);
                    }
                }
                
                // 生成STL文件内容
                let stlContent = 'solid revolution\n';
                
                for (let face of faces) {
                    let v1 = vertices[face[0]];
                    let v2 = vertices[face[1]];
                    let v3 = vertices[face[2]];
                    
                    // 检查退化三角形
                    const edge1 = subtract(v2, v1);
                    const edge2 = subtract(v3, v1);
                    const normal = crossProduct(edge1, edge2);
                    const normalLen = Math.sqrt(normal[0]**2 + normal[1]**2 + normal[2]**2);
                    
                    if (normalLen < 0.0001) {
                        continue; // 跳过退化三角形
                    }
                    
                    let normalNorm = normalize(normal);
                    
                    // 计算中心点
                    const center = [
                        (v1[0] + v2[0] + v3[0]) / 3.0,
                        (v1[1] + v2[1] + v3[1]) / 3.0,
                        (v1[2] + v2[2] + v3[2]) / 3.0
                    ];
                    
                    // 检查法线方向
                    const toCenterX = center[0];
                    const toCenterZ = center[2];
                    const distFromAxisSq = toCenterX**2 + toCenterZ**2;
                    
                    if (distFromAxisSq > 0.0001) {
                        const distFromAxis = Math.sqrt(distFromAxisSq);
                        const dirToCenterX = toCenterX / distFromAxis;
                        const dirToCenterZ = toCenterZ / distFromAxis;
                        
                        const normalXzLenSq = normalNorm[0]**2 + normalNorm[2]**2;
                        
                        if (normalXzLenSq > 0.0001) {
                            const normalXzLen = Math.sqrt(normalXzLenSq);
                            const normalXzX = normalNorm[0] / normalXzLen;
                            const normalXzZ = normalNorm[2] / normalXzLen;
                            
                            const dot = dirToCenterX * normalXzX + dirToCenterZ * normalXzZ;
                            
                            if (dot < 0) {
                                // 反转法线
                                normalNorm = [-normalNorm[0], -normalNorm[1], -normalNorm[2]];
                                // 交换v2和v3
                                const temp = v2;
                                v2 = v3;
                                v3 = temp;
                            }
                        }
                    }
                    
                    // 写入面
                    stlContent += `  facet normal ${normalNorm[0].toExponential(6)} ${normalNorm[1].toExponential(6)} ${normalNorm[2].toExponential(6)}\n`;
                    stlContent += '    outer loop\n';
                    stlContent += `      vertex ${v1[0].toExponential(6)} ${v1[1].toExponential(6)} ${v1[2].toExponential(6)}\n`;
                    stlContent += `      vertex ${v2[0].toExponential(6)} ${v2[1].toExponential(6)} ${v2[2].toExponential(6)}\n`;
                    stlContent += `      vertex ${v3[0].toExponential(6)} ${v3[1].toExponential(6)} ${v3[2].toExponential(6)}\n`;
                    stlContent += '    endloop\n';
                    stlContent += '  endfacet\n';
                }
                
                stlContent += 'endsolid revolution\n';
                
                // 下载文件
                const blob = new Blob([stlContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'revolution.stl';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                // 显示成功信息
                resultInfo.innerHTML = `
                    <strong>✓ STL文件生成成功！</strong><br>
                    轮廓点数: ${numProfilePoints}<br>
                    旋转分段数: ${numRotationSegments}<br>
                    顶点数: ${vertices.length}<br>
                    面数: ${faces.length}<br>
                    文件已自动下载为 <code>revolution.stl</code>
                `;
                successMsg.style.display = 'block';
                successMsg.textContent = '文件已成功下载到您的下载文件夹！';
                
            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '错误: ' + error.message;
                resultInfo.innerHTML = '';
            }
        }
        
        // 加载示例
        function loadExample() {
            document.getElementById('points').value = `0, 0
-35, 0
-35, 5
-25, 5
-25, 20
-20, 20
-20, 10
0, 10`;
        }
        
        // 清空
        function clearAll() {
            document.getElementById('points').value = '';
            document.getElementById('segments').value = '128';
            document.getElementById('result').classList.remove('show');
        }
    </script>
</body>
</html>
